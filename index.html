<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Wujud Zat H2O</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1c1e1f; /* Warna latar belakang luar kanvas (Dark Grey) */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #simulation-container {
            width: 512px;
            height: 288px;
            position: relative;
            overflow: hidden;
            /* Mempertahankan kualitas pixel art */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }

        /* Pengaturan Layer Dasar */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 512px;
            height: 288px;
            pointer-events: none; /* Agar klik diteruskan ke overlay paling atas */
        }

        /* Urutan Z-Index berdasarkan permintaan */
        #layer-canvas { z-index: 1; pointer-events: auto; }
        #layer-tray-back { z-index: 2; display: none; }
        #layer-gif { z-index: 3; display: none; }
        #layer-tray-front { z-index: 4; display: none; }

        /* HUD Text Container */
        .hud-text {
            position: absolute;
            height: 32px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: black;
        }

        /* REVISI: Mengatur gaya khusus untuk subscript agar sejajar */
        .hud-text sub {
            font-size: 18px; /* Sedikit lebih kecil dari font dasar (24px) */
            vertical-align: baseline; /* Gunakan baseline dasar */
            position: relative;
            top: 3px; /* Dorong ke bawah agar rata dengan huruf biasa */
        }

        #hud-lambang {
            left: 160px; /* Koordinat f2 */
            top: 32px;
            width: 96px; /* 3 tile (f, g, h) */
            /* Tidak ada text-transform lowercase di sini agar H2O tetap kapital */
        }

        #hud-wujud {
            left: 256px; /* Koordinat i2 */
            top: 32px;
            width: 96px; /* 3 tile (i, j, k) */
            text-transform: lowercase; /* Wujud tetap lowercase (padat, cair, gas) */
        }

        /* Indikator Titik Klik */
        #circle-point {
            position: absolute;
            z-index: 6;
            transform: translate(-50%, -50%); /* Agar titik tengah persis di klik */
            display: none;
            pointer-events: none;
        }

        /* Transisi Ulangi Simulasi */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        /* Area Overlay Interaktif Transparan Paling Atas */
        #interactive-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="simulation-container">
    <img id="layer-canvas" class="layer" src="kanvaspwz.png" alt="Kanvas">
    
    <img id="layer-tray-back" class="layer" src="pwzh2otray.png" alt="Tray Back">
    
    <img id="layer-gif" class="layer" src="" alt="Zat Animasi">
    
    <img id="layer-tray-front" class="layer" src="pwzh2oftray.png" alt="Tray Front">

    <div id="hud-lambang" class="hud-text"></div>
    <div id="hud-wujud" class="hud-text"></div>

    <img id="circle-point" src="circlepoint.gif" alt="Target Point">

    <div id="fade-overlay"></div>

    <div id="interactive-overlay"></div>
</div>

<script>
    // ==========================================
    // PRELOADER ASET
    // ==========================================
    const assets = [
        'kanvaspwz.png', 'pwzh2otray.png', 'pwzh2oftray.png', 'circlepoint.gif',
        'pwzh2os.gif', 'pwzh2osl.gif', 'pwzh2ol.gif', 'pwzh2ol50.gif',
        'pwzh2olg.gif', 'pwzh2olg100.gif'
    ];
    assets.forEach(src => {
        const img = new Image();
        img.src = src;
    });

    // ==========================================
    // VARIABEL & STATE MESIN
    // ==========================================
    let simState = 'OFF'; // OFF, S, L, L50, G, TRANSITION
    let idleTimer = null;
    let circleTimeout = null;

    // Elemen DOM
    const layerTrayBack = document.getElementById('layer-tray-back');
    const layerGif = document.getElementById('layer-gif');
    const layerTrayFront = document.getElementById('layer-tray-front');
    const hudLambang = document.getElementById('hud-lambang');
    const hudWujud = document.getElementById('hud-wujud');
    const circlePoint = document.getElementById('circle-point');
    const fadeOverlay = document.getElementById('fade-overlay');
    const interactiveOverlay = document.getElementById('interactive-overlay');

    // Data Status Default (Lambang sudah diatur kapital dengan sub html)
    const stateData = {
        'S': { src: 'pwzh2os.gif', lambang: 'H<sub>2</sub>O<sub>(s)</sub>', wujud: 'padat' },
        'L': { src: 'pwzh2ol.gif', lambang: 'H<sub>2</sub>O<sub>(l)</sub>', wujud: 'cair' },
        'L50': { src: 'pwzh2ol50.gif', lambang: 'H<sub>2</sub>O<sub>(l)</sub>', wujud: 'cair' },
        'G': { src: 'pwzh2olg100.gif', lambang: 'H<sub>2</sub>O<sub>(g)</sub>', wujud: 'gas' }
    };

    // Fungsi Render Visual
    function setVisualState(stateKey) {
        if(stateData[stateKey]) {
            // Memaksa reload GIF untuk reset animasi
            layerGif.src = stateData[stateKey].src + '?t=' + new Date().getTime(); 
            updateHUD(stateData[stateKey].lambang, stateData[stateKey].wujud);
        }
    }

    function updateHUD(lambang, wujud) {
        hudLambang.innerHTML = lambang;
        hudWujud.innerHTML = wujud;
    }

    function clearHUD() {
        hudLambang.innerHTML = '';
        hudWujud.innerHTML = '';
    }

    // ==========================================
    // LOGIKA TRANSISI & TIMER
    // ==========================================
    function playTransition(gifSrc, duration, nextState) {
        simState = 'TRANSITION';
        clearTimeout(idleTimer);
        layerGif.src = gifSrc + '?t=' + new Date().getTime();
        
        setTimeout(() => {
            simState = nextState;
            setVisualState(nextState);
        }, duration);
    }

    function startIdleMeltTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (simState === 'S') {
                playTransition('pwzh2osl.gif', 4000, 'L');
            }
        }, 10000); // 10 Detik
    }

    // ==========================================
    // LOGIKA TOMBOL
    // ==========================================
    function handlePower() {
        if (simState === 'OFF') {
            simState = 'S';
            layerTrayBack.style.display = 'block';
            layerGif.style.display = 'block';
            layerTrayFront.style.display = 'block';
            setVisualState('S');
            startIdleMeltTimer();
        }
    }

    function handleMinus() {
        if (simState === 'TRANSITION' || simState === 'OFF') return;

        if (simState === 'S') {
            startIdleMeltTimer(); // Reset timer
        } else if (simState === 'L50') {
            simState = 'L';
            setVisualState('L'); // L50 ke L tanpa transisi khusus
        } else if (simState === 'G') {
            playTransition('pwzh2olg.gif', 4000, 'L50'); // G ke L50 dengan transisi balik
        }
    }

    function handlePlus() {
        if (simState === 'TRANSITION' || simState === 'OFF') return;

        if (simState === 'S') {
            clearTimeout(idleTimer);
            playTransition('pwzh2osl.gif', 4000, 'L50');
        } else if (simState === 'L') {
            simState = 'L50';
            setVisualState('L50');
        } else if (simState === 'L50') {
            playTransition('pwzh2olg.gif', 4000, 'G');
        }
    }

    function resetSimulation() {
        fadeOverlay.style.opacity = 1;
        setTimeout(() => {
            clearTimeout(idleTimer);
            clearTimeout(circleTimeout);
            simState = 'OFF';
            layerTrayBack.style.display = 'none';
            layerGif.style.display = 'none';
            layerTrayFront.style.display = 'none';
            circlePoint.style.display = 'none';
            clearHUD();
            fadeOverlay.style.opacity = 0;
        }, 300);
    }

    // ==========================================
    // LOGIKA HITBOX & CIRCLE POINT
    // ==========================================
    interactiveOverlay.addEventListener('mousedown', (e) => {
        // Deteksi Koordinat Pixel
        const x = e.offsetX;
        const y = e.offsetY;
        
        // Deteksi Grid 16x9 (Ukuran tile 32x32)
        const col = Math.floor(x / 32); // a=0, b=1, ... p=15
        const row = Math.floor(y / 32); // 1=0, 2=1, ... 9=8

        // Deteksi Tombol Fisik
        if (col === 9 && row === 7) handlePower();     // j8: Power
        if (col === 5 && row === 7) handleMinus();     // f8: Minus
        if (col === 10 && row === 7) handlePlus();     // k8: Plus
        if (col === 0 && row === 0) resetSimulation(); // a1: Ulangi
        if (col === 15 && row === 0) return;           // p1: Zat Lainnya (Placeholder)

        // Deteksi Hitbox Area (f3-k6) -> Pixel X:160-352, Y:64-192
        if (simState !== 'OFF' && simState !== 'TRANSITION') {
            if (x >= 160 && x < 352 && y >= 64 && y < 192) {
                
                // Tampilkan Circle Point
                circlePoint.style.left = x + 'px';
                circlePoint.style.top = y + 'px';
                circlePoint.style.display = 'block';

                let validHit = false;
                let overrideLambang = stateData[simState].lambang;
                let overrideWujud = stateData[simState].wujud;

                // Cek Validitas Berdasarkan State Aktif
                if (simState === 'S') {
                    // h5, h6, i5, i6 (X:224-288, Y:128-192)
                    if (x >= 224 && x < 288 && y >= 128 && y < 192) validHit = true;
                } 
                else if (simState === 'L' || simState === 'L50') {
                    // f6-k6 (X:160-352, Y:160-192)
                    if (x >= 160 && x < 352 && y >= 160 && y < 192) validHit = true;
                } 
                else if (simState === 'G') {
                    // f3-k5 (Gas Hitbox)
                    if (x >= 160 && x < 352 && y >= 64 && y < 160) {
                        validHit = true;
                        overrideLambang = 'H<sub>2</sub>O<sub>(g)</sub>';
                        overrideWujud = 'gas';
                    }
                    // f6-k6 (Cair Hitbox dalam kondisi mendidih)
                    else if (x >= 160 && x < 352 && y >= 160 && y < 192) {
                        validHit = true;
                        overrideLambang = 'H<sub>2</sub>O<sub>(l)</sub>';
                        overrideWujud = 'cair';
                    }
                }

                // Logika Tampilan HUD saat Hitbox Ditekan
                clearTimeout(circleTimeout);
                if (validHit) {
                    updateHUD(overrideLambang, overrideWujud);
                } else {
                    clearHUD();
                }

                // Hilangkan Circle dan kembalikan HUD setelah 3 Detik
                circleTimeout = setTimeout(() => {
                    circlePoint.style.display = 'none';
                    if (simState !== 'OFF' && simState !== 'TRANSITION') {
                        updateHUD(stateData[simState].lambang, stateData[simState].wujud);
                    }
                }, 3000);
            }
        }
    });

</script>
</body>
</html>
